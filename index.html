*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F4F4F2;
  color: #111;
  font-size: 13px;
  line-height: 1.5;
}

.header {
  background: #111;
  color: #fff;
  padding: 22px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-brand { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; opacity: .5; margin-bottom: 2px; }
.header h1 { font-size: 17px; font-weight: 700; letter-spacing: -.01em; }
.header-right { display: flex; align-items: center; gap: 12px; }
.btn-pdf {
  background: transparent; color: #fff; border: 1px solid rgba(255,255,255,.3);
  padding: 7px 18px; border-radius: 20px; cursor: pointer;
  font-size: 11px; font-weight: 600; letter-spacing: .04em;
  transition: all .15s;
}
.btn-pdf:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.6); }
.btn-expand-all {
  background: transparent; color: rgba(255,255,255,.7); border: 1px solid rgba(255,255,255,.2);
  padding: 7px 18px; border-radius: 20px; cursor: pointer;
  font-size: 11px; font-weight: 600; letter-spacing: .04em;
  transition: all .15s;
}
.btn-expand-all:hover { color: #fff; border-color: rgba(255,255,255,.5); }

.stats {
  background: #fff;
  border-bottom: 1px solid #E8E8E8;
  padding: 20px 40px;
  display: flex;
  gap: 48px;
}
.stat { display: flex; flex-direction: column; gap: 3px; }
.stat-n { font-size: 28px; font-weight: 700; letter-spacing: -.02em; }
.stat-l { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .05em; }

.content { max-width: 900px; margin: 0 auto; padding: 24px 40px 80px; }

/* ACCORDION */
.prod-entry {
  margin-bottom: 8px;
  background: #fff;
  border: 1px solid #E8E8E8;
  border-radius: 10px;
  overflow: hidden;
}

.prod-trigger {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
  transition: background .15s;
}
.prod-trigger:hover { background: #FAFAFA; }

.prod-index {
  width: 28px; height: 28px;
  background: #111; color: #fff;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
}
.prod-info { flex: 1; }
.prod-name { font-size: 14px; font-weight: 600; }
.prod-sub { font-size: 11px; color: #AAA; margin-top: 1px; display: flex; gap: 10px; }

.prod-trigger-right { display: flex; align-items: center; gap: 10px; }
.prod-badge {
  font-size: 10px; font-weight: 700; padding: 3px 10px;
  border-radius: 10px; background: #F0F0F0; color: #555;
}
.prod-campi {
  font-size: 10px; color: #AAA; white-space: nowrap;
}
.prod-date { font-size: 11px; color: #CCC; white-space: nowrap; }

.chevron {
  font-size: 11px; color: #CCC;
  transition: transform .22s ease;
  flex-shrink: 0;
}
.prod-entry.open .chevron { transform: rotate(180deg); }

/* BODY ACCORDION */
.prod-body {
  display: none;
  border-top: 1px solid #EAEAEA;
  padding: 16px 18px 18px;
}
.prod-entry.open .prod-body { display: block; }

.modifiche-grid { display: flex; flex-direction: column; gap: 10px; }

.modifica-row {
  border: 1px solid #E8E8E8;
  border-radius: 8px;
  overflow: hidden;
  display: grid;
  grid-template-columns: 155px 1fr 1fr;
}

.mod-label {
  background: #F8F8F8;
  border-right: 1px solid #E8E8E8;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
}
.mod-label-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #444; }
.mod-label-hint { font-size: 10px; color: #AAA; line-height: 1.4; }
.mod-label-problem { font-size: 10px; color: #C62828; line-height: 1.4; margin-top: 5px; }

.mod-before { padding: 12px 14px; border-right: 1px solid #E8E8E8; background: #FFFAF9; }
.mod-after  { padding: 12px 14px; background: #F9FFF9; }

.col-head { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
.col-head-before { color: #C62828; }
.col-head-after  { color: #2E7D32; }

.mod-value { font-size: 12px; line-height: 1.6; color: #333; }
.mod-value.is-code {
  font-family: 'SF Mono', Menlo, Consolas, monospace;
  font-size: 11px; background: #F4F4F4;
  border: 1px solid #E8E8E8; border-radius: 5px;
  padding: 4px 8px; display: inline-block;
}
.mod-value.is-code.after { background: #EDF7ED; border-color: #C3E6CB; color: #1B5E20; }

.tags-wrap { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
.tag-pill { font-size: 11px; padding: 3px 9px; border-radius: 10px; font-weight: 500; }
.tag-pill.old { background: #F5F5F5; color: #999; text-decoration: line-through; }

.tag-editable {
  font-size: 11px; padding: 3px 6px 3px 10px; border-radius: 10px; font-weight: 500;
  display: inline-flex; align-items: center; gap: 5px;
  background: #E8F5E9; color: #2E7D32; border: 1px solid #C3E6CB;
}
.tag-editable.was-old { background: #E3F2FD; color: #1565C0; border-color: #BBDEFB; }
.tag-remove {
  width: 14px; height: 14px; border-radius: 50%;
  background: rgba(0,0,0,.12); border: none; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: inherit;
  padding: 0; flex-shrink: 0; transition: background .15s;
}
.tag-remove:hover { background: rgba(0,0,0,.25); }

.tag-add-wrap { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
.tag-input {
  font-size: 11px; padding: 4px 10px; border-radius: 10px;
  border: 1px dashed #AAA; outline: none; color: #111;
  background: #FAFAFA; width: 130px; transition: border-color .15s;
}
.tag-input:focus { border-color: #2E7D32; border-style: solid; background: #fff; }
.tag-input::placeholder { color: #CCC; }
.btn-add-tag {
  font-size: 11px; padding: 4px 12px; border-radius: 10px;
  background: #111; color: #fff; border: none; cursor: pointer;
  font-weight: 600; transition: background .15s;
}
.btn-add-tag:hover { background: #333; }

.mod-note {
  background: #FFFBF0; border: 1px solid #FFE0B2;
  border-radius: 8px; padding: 10px 14px;
  font-size: 11px; color: #7B5300;
  display: flex; gap: 8px; align-items: flex-start;
  margin-top: 10px;
}

.footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #111; color: rgba(255,255,255,.5);
  font-size: 11px; padding: 9px 40px;
  display: flex; justify-content: space-between; align-items: center;
}
.footer strong { color: #fff; }

@media print {
  .header { position: static; background: #111 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .footer, .btn-pdf, .btn-expand-all, .tag-add-wrap, .tag-remove { display: none; }
  .prod-body { display: block !important; }
  .prod-trigger { cursor: default; }
  body { background: #fff; }
  .modifica-row { break-inside: avoid; }
  .prod-entry { break-inside: avoid; margin-bottom: 16px; }
}

let tagState = {};

async function initTagStates() {
  const saved = await fbGet('/tags') || {};
  // Inizializza sempre da REPORT_DATA per i tag mancanti
  REPORT_DATA.forEach((p, pi) => {
    p.modifiche.forEach((m, mi) => {
      if (m.tipo === 'tags') {
        const key = pi + '-' + mi;
        if (saved[key]) {
          tagState[key] = saved[key]; // usa Firebase se esiste
        } else {
          const oldSet = new Set(m.prima);
          tagState[key] = m.dopo.map(t => ({ tag: t, isOld: oldSet.has(t) }));
        }
      }
    });
  });
  await fbSet('/tags', tagState);
}

async function saveTagState() {
  await fbSet('/tags', tagState);
  const badge = document.getElementById('saveBadge');
  if (badge) { badge.style.opacity = '1'; setTimeout(() => badge.style.opacity = '0', 1500); }
}

function removeTag(key, idx) {
  tagState[key].splice(idx, 1);
  renderTagsFor(key);
  saveTagState();
}

function addTag(key, inputId) {
  const input = document.getElementById(inputId);
  const val = input.value.trim();
  if (!val) return;
  if (tagState[key].some(t => t.tag.toLowerCase() === val.toLowerCase())) { input.value=''; return; }
  tagState[key].push({ tag: val, isOld: false });
  input.value = '';
  renderTagsFor(key);
  saveTagState();
}

function renderTagsFor(key) {
  const wrap = document.getElementById('tags-after-' + key);
  if (!wrap) return;
  let html = tagState[key].map((t, i) =>
    `<span class="tag-editable ${t.isOld ? 'was-old' : ''}">
      ${t.tag}
      <button class="tag-remove" onclick="removeTag('${key}',${i})" title="Rimuovi">✕</button>
    </span>`
  ).join('');
  html += `<div class="tag-add-wrap">
    <input class="tag-input" id="inp-${key}" type="text" placeholder="Aggiungi tag..." onkeydown="if(event.key==='Enter')addTag('${key}','inp-${key}')">
    <button class="btn-add-tag" onclick="addTag('${key}','inp-${key}')">+ Aggiungi</button>
  </div>`;
  wrap.innerHTML = html;
}

function fmt(d) {
  if (!d) return '';
  const [y,m,g] = d.split('-');
  const mesi = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  return g + ' ' + mesi[parseInt(m)-1] + ' ' + y;
}

function toggleEntry(id) {
  const el = document.getElementById('entry-' + id);
  el.classList.toggle('open');
  if (el.classList.contains('open')) {
    REPORT_DATA.forEach((p, pi) => {
      p.modifiche.forEach((m, mi) => {
        if (m.tipo === 'tags') renderTagsFor(pi + '-' + mi);
      });
    });
  }
  updateExpandBtn();
}

let allExpanded = false;
function toggleAll() {
  allExpanded = !allExpanded;
  REPORT_DATA.forEach((_, pi) => {
    const el = document.getElementById('entry-' + pi);
    if (el) {
      if (allExpanded) el.classList.add('open');
      else el.classList.remove('open');
    }
  });
  if (allExpanded) {
    REPORT_DATA.forEach((p, pi) => {
      p.modifiche.forEach((m, mi) => {
        if (m.tipo === 'tags') renderTagsFor(pi + '-' + mi);
      });
    });
  }
  updateExpandBtn();
}

function updateExpandBtn() {
  const anyOpen = REPORT_DATA.some((_, pi) => {
    const el = document.getElementById('entry-' + pi);
    return el && el.classList.contains('open');
  });
  const btn = document.getElementById('btnExpandAll');
  if (!btn) return;
  const allOpen = REPORT_DATA.every((_, pi) => {
    const el = document.getElementById('entry-' + pi);
    return el && el.classList.contains('open');
  });
  allExpanded = allOpen;
  btn.textContent = allOpen ? 'Chiudi tutti' : 'Espandi tutti';
}

function escapeHtml(str) {
  if (typeof str !== 'string') return str;
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function renderModifica(m, pi, mi) {
  const key = pi + '-' + mi;
  let beforeHtml = '', afterHtml = '';

  if (m.tipo === 'code') {
    beforeHtml = `<span class="mod-value is-code">${escapeHtml(m.prima)}</span>`;
    afterHtml  = `<span class="mod-value is-code after">${escapeHtml(m.dopo)}</span>`;
  } else if (m.tipo === 'tags') {
    beforeHtml = `<div class="tags-wrap">${m.prima.map(t => `<span class="tag-pill old">${escapeHtml(t)}</span>`).join('')}</div>`;
    afterHtml  = `<div class="tags-wrap" id="tags-after-${key}"></div>`;
  } else {
    beforeHtml = `<div class="mod-value">${escapeHtml(m.prima)}</div>`;
    afterHtml  = `<div class="mod-value">${escapeHtml(m.dopo)}</div>`;
  }

  return `
    <div class="modifica-row">
      <div class="mod-label">
        <div class="mod-label-name">${escapeHtml(m.campo)}</div>
        <div class="mod-label-hint">${escapeHtml(m.dove)}</div>
        ${m.problema ? `<div class="mod-label-problem">${escapeHtml(m.problema)}</div>` : ''}
      </div>
      <div class="mod-before">
        <div class="col-head col-head-before">Prima</div>
        ${beforeHtml}
      </div>
      <div class="mod-after">
        <div class="col-head col-head-after">Dopo</div>
        ${afterHtml}
      </div>
    </div>`;
}

function render() {
  const el = document.getElementById('content');
  let html = '';
  let totCampi = 0, totTesti = 0;

  REPORT_DATA.forEach((p, pi) => {
    totCampi += p.modifiche.length;
    totTesti += p.modifiche.filter(m => m.tipo === 'text').length;
    const campiStr = p.modifiche.length + ' ' + (p.modifiche.length === 1 ? 'modifica' : 'modifiche');

    html += `
      <div class="prod-entry" id="entry-${pi}">
        <div class="prod-trigger" onclick="toggleEntry(${pi})">
          <div class="prod-index">${p.num}</div>
          <div class="prod-info">
            <div class="prod-name">${escapeHtml(p.title)}</div>
            <div class="prod-sub">
              <span>/products/${escapeHtml(p.handle)}</span>
              ${p.price ? `<span>€${escapeHtml(p.price)}</span>` : ''}
            </div>
          </div>
          <div class="prod-trigger-right">
            <span class="prod-campi">${campiStr}</span>
            <span class="prod-badge">${escapeHtml(p.cat)}</span>
            ${p.data ? `<span class="prod-date">${fmt(p.data)}</span>` : ''}
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="prod-body">
          <div class="modifiche-grid">
            ${p.modifiche.map((m, mi) => renderModifica(m, pi, mi)).join('')}
          </div>
          ${p.rimandato && p.rimandato.length ? `
            <div class="mod-note">
              <span>⏸</span>
              <span><strong>Rimandato:</strong> ${p.rimandato.map(r => escapeHtml(r)).join(' · ')}</span>
            </div>` : ''}
          ${p.note ? `<div class="mod-note"><span>💬</span><span>${escapeHtml(p.note)}</span></div>` : ''}
        </div>
      </div>`;
  });

  el.innerHTML = html;
  document.getElementById('statProd').textContent = REPORT_DATA.length;
  document.getElementById('statMod').textContent = totCampi;
  document.getElementById('statTesti').textContent = totTesti;
}

(async () => {
  await initTagStates();
  render();

  // Auto-sincronizzazione ogni 45 secondi
  setInterval(async () => {
    const newTags = await fbGet('/tags');
    if (newTags && JSON.stringify(newTags) !== JSON.stringify(tagState)) {
      tagState = newTags;
      REPORT_DATA.forEach((p, pi) => {
        p.modifiche.forEach((m, mi) => {
          if (m.tipo === 'tags') renderTagsFor(pi + '-' + mi);
        });
      });
    }
  }, 45000);
})();
